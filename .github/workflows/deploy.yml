name: Deploy

on:
  push:
    paths:
      - '.github/workflows/deploy.yml'
      - '**.typ'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Times New Roman
        run: |
          sudo add-apt-repository multiverse
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install ttf-mscorefonts-installer
          sudo fc-cache -rv
      - name: Download Pretendard
        run: |
          mkdir -p fonts
          curl -fL --retry 5 --retry-delay 10 --retry-all-errors -o pretendard.zip \
            https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip
          unzip -jo pretendard.zip \
            'public/static/Pretendard-Regular.otf' \
            'public/static/Pretendard-SemiBold.otf' \
            'public/static/Pretendard-Bold.otf' \
            -d fonts
          rm pretendard.zip
      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ^0.14.0
      - name: Render PDF
        run: |
          mkdir -p dist
          typst compile CV_Park.typ dist/CV_Park.pdf
          typst compile Portfolio_Park_KR.typ dist/Portfolio_Park_KR.pdf --font-path .
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
