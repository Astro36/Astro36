name: Deploy

on:
  push:
    paths:
      - '.github/workflows/deploy.yml'
      - '**.typ'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Times New Roman
        run: |
          sudo add-apt-repository multiverse
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install ttf-mscorefonts-installer
          sudo fc-cache -rv
      - name: Download Pretendard
        run: |
          wget https://github.com/orioncactus/pretendard/raw/refs/heads/main/packages/pretendard/dist/public/static/Pretendard-Bold.otf
          wget https://github.com/orioncactus/pretendard/raw/refs/heads/main/packages/pretendard/dist/public/static/Pretendard-SemiBold.otf
          wget https://github.com/orioncactus/pretendard/raw/refs/heads/main/packages/pretendard/dist/public/static/Pretendard-Regular.otf
      - name: Setup Typst
        uses: typst-community/setup-typst@v4
      - name: Render PDF
        run: |
          mkdir -p dist
          typst compile CV_Park.typ dist/CV_Park.pdf
          typst compile Portfolio_Park_KR.typ dist/Portfolio_Park_KR.pdf --font-path .
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
